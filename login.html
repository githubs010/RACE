<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — Race Panel</title>
<link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@400,500,700,800,900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#090606;--surface:#140f0f;--surface-2:#1e1515;--border:rgba(255,255,255,0.07);
  --text:#ede9e9;--text-muted:#9a9090;--text-faint:#4e4444;
  --gold:#f5c800;--red:#ff4444;--green:#00e676;
  --r-md:.5rem;--r-lg:.75rem;--r-xl:1rem;--t:180ms cubic-bezier(.16,1,.3,1);
}
body{
  min-height:100dvh;font-family:'Cabinet Grotesk','Inter',sans-serif;
  color:var(--text);background:var(--bg);
  display:flex;align-items:center;justify-content:center;padding:1.5rem;
  background-image:
    radial-gradient(ellipse 90% 60% at 50% -10%,rgba(107,26,26,.45) 0%,transparent 65%),
    radial-gradient(ellipse 40% 40% at 80% 90%,rgba(60,10,10,.3) 0%,transparent 60%);
}

.login-box{
  width:100%;max-width:400px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r-xl);
  overflow:hidden;
  box-shadow:0 24px 80px rgba(0,0,0,.8), 0 0 0 1px rgba(245,200,0,.05);
  animation:popIn .4s cubic-bezier(.16,1,.3,1);
}
@keyframes popIn{from{opacity:0;transform:scale(.94) translateY(16px)}to{opacity:1;transform:scale(1) translateY(0)}}

.login-header{
  background:linear-gradient(135deg,#1e0f0f 0%,#2d1515 100%);
  border-bottom:2px solid var(--gold);
  padding:2rem 2rem 1.5rem;
  text-align:center;
}
.login-icon{font-size:2.5rem;margin-bottom:.75rem;display:block}
.login-badge{display:inline-flex;align-items:center;gap:.35rem;background:rgba(255,68,68,.15);color:var(--red);border:1px solid rgba(255,68,68,.3);border-radius:.35rem;padding:.22rem .55rem;font-size:.65rem;font-weight:900;letter-spacing:.12em;text-transform:uppercase;margin-bottom:.75rem}
.login-title{font-size:1.4rem;font-weight:900;letter-spacing:.08em;text-transform:uppercase;color:var(--gold)}
.login-sub{font-size:.8rem;color:var(--text-muted);margin-top:.4rem}

.login-body{padding:1.75rem 2rem 2rem;display:flex;flex-direction:column;gap:1rem}

.form-group{display:flex;flex-direction:column;gap:.4rem}
.form-label{font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted)}
.input-wrap{position:relative;display:flex;align-items:center}
.form-input{
  width:100%;background:var(--surface-2);border:1px solid var(--border);
  border-radius:var(--r-md);padding:.7rem 2.5rem .7rem 1rem;
  font-family:inherit;font-size:.9rem;font-weight:600;color:var(--text);
  outline:none;transition:border-color var(--t),box-shadow var(--t);
}
.form-input::placeholder{color:var(--text-faint);font-weight:400}
.form-input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(245,200,0,.12)}
.form-input.err{border-color:var(--red);box-shadow:0 0 0 3px rgba(255,68,68,.12)}
.toggle-pw{position:absolute;right:.75rem;background:none;border:none;cursor:pointer;font-size:1rem;color:var(--text-faint);padding:0;line-height:1;transition:color var(--t)}
.toggle-pw:hover{color:var(--text)}

.btn-login{
  width:100%;background:var(--gold);color:#0a0808;
  border:none;border-radius:var(--r-md);
  padding:.8rem 1.5rem;
  font-family:inherit;font-size:.9rem;font-weight:900;
  letter-spacing:.1em;text-transform:uppercase;
  cursor:pointer;margin-top:.25rem;
  transition:background var(--t),box-shadow var(--t),transform var(--t);
  display:flex;align-items:center;justify-content:center;gap:.5rem;
}
.btn-login:hover{background:#ffd500;box-shadow:0 0 20px rgba(245,200,0,.35)}
.btn-login:active{transform:scale(.98)}
.btn-login:disabled{opacity:.5;cursor:not-allowed;pointer-events:none}

.error-msg{
  background:rgba(255,68,68,.1);border:1px solid rgba(255,68,68,.25);
  border-radius:var(--r-md);padding:.65rem .9rem;
  font-size:.8rem;color:var(--red);font-weight:600;
  display:none;align-items:center;gap:.5rem;
}
.error-msg.show{display:flex}

.cred-hint{
  background:rgba(245,200,0,.06);border:1px solid rgba(245,200,0,.15);
  border-radius:var(--r-md);padding:.65rem .9rem;
  font-size:.75rem;color:var(--text-muted);
  display:flex;flex-direction:column;gap:.2rem;
}
.cred-hint strong{color:var(--gold);font-size:.7rem;letter-spacing:.1em;text-transform:uppercase}

.divider{display:flex;align-items:center;gap:.75rem;color:var(--text-faint);font-size:.75rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

.shake{animation:shake .4s cubic-bezier(.36,.07,.19,.97)}
@keyframes shake{10%,90%{transform:translateX(-2px)}20%,80%{transform:translateX(3px)}30%,50%,70%{transform:translateX(-4px)}40%,60%{transform:translateX(4px)}}

footer{position:fixed;bottom:1rem;left:50%;transform:translateX(-50%);font-size:.72rem;color:var(--text-faint);text-align:center;white-space:nowrap}
</style>
</head>
<body>

<div class="login-box" id="login-box">
  <div class="login-header">
    <span class="login-icon">🏁</span>
    <div class="login-badge">🔒 Admin Only</div>
    <div class="login-title">Race Control</div>
    <div class="login-sub">Sign in to manage the event</div>
  </div>

  <div class="login-body">

    <!-- Error -->
    <div class="error-msg" id="err-msg">
      ❌ <span id="err-text">Invalid username or password.</span>
    </div>

    <!-- Username -->
    <div class="form-group">
      <label class="form-label" for="inp-user">Username</label>
      <div class="input-wrap">
        <input class="form-input" id="inp-user" type="text" placeholder="Enter username" autocomplete="username" />
      </div>
    </div>

    <!-- Password -->
    <div class="form-group">
      <label class="form-label" for="inp-pass">Password</label>
      <div class="input-wrap">
        <input class="form-input" id="inp-pass" type="password" placeholder="Enter password" autocomplete="current-password" />
        <button class="toggle-pw" id="toggle-pw" onclick="togglePw()" type="button" title="Show/Hide password">👁️</button>
      </div>
    </div>

    <!-- Login Button -->
    <button class="btn-login" id="btn-login" onclick="doLogin()">
      🔓 Sign In to Admin
    </button>

    <div class="divider">Default Credentials</div>

    <!-- Hint box -->
    <div class="cred-hint">
      <strong>🔑 Change credentials inside login.html</strong>
      <span>Username: <code>admin</code></span>
      <span>Password: <code>race2024</code></span>
      <span style="margin-top:.25rem;font-size:.7rem;color:var(--text-faint)">Edit the USERS object in the &lt;script&gt; to set your own.</span>
    </div>

  </div>
</div>

<footer>🏁 Race Lap Time Panel · Admin Access Only</footer>

<script>
// ═══════════════════════════════════════════════
//  CREDENTIALS — Edit username & password here
// ═══════════════════════════════════════════════
const USERS = {
  "admin":     "race2024",
  "prasad":    "prasad123",
  "organizer": "event@2026"
};
// Add more users as:  "username": "password"
// ═══════════════════════════════════════════════

const SESSION_KEY = "raceAdminSession";
const SESSION_DURATION = 8 * 60 * 60 * 1000; // 8 hours

// If already logged in, skip login
window.onload = () => {
  const s = JSON.parse(sessionStorage.getItem(SESSION_KEY) || "null");
  if (s && s.expires > Date.now()) {
    window.location.href = "admin.html";
  }
};

document.getElementById("inp-pass").addEventListener("keydown", e => {
  if (e.key === "Enter") doLogin();
});
document.getElementById("inp-user").addEventListener("keydown", e => {
  if (e.key === "Enter") document.getElementById("inp-pass").focus();
});

function doLogin() {
  const user = document.getElementById("inp-user").value.trim();
  const pass = document.getElementById("inp-pass").value;
  const btn  = document.getElementById("btn-login");

  if (!user || !pass) {
    showError("Please enter both username and password.");
    return;
  }

  // Simulate brief loading
  btn.disabled = true;
  btn.innerHTML = '<div style="width:16px;height:16px;border:2px solid rgba(10,8,8,.3);border-top-color:#0a0808;border-radius:50%;animation:spin .6s linear infinite"></div> Signing in…';

  setTimeout(() => {
    if (USERS[user] && USERS[user] === pass) {
      // Save session
      sessionStorage.setItem(SESSION_KEY, JSON.stringify({
        user, expires: Date.now() + SESSION_DURATION
      }));
      btn.innerHTML = "✅ Access Granted!";
      btn.style.background = "var(--green)";
      setTimeout(() => window.location.href = "admin.html", 600);
    } else {
      btn.disabled = false;
      btn.innerHTML = "🔓 Sign In to Admin";
      showError("❌ Invalid username or password. Try again.");
      document.getElementById("login-box").classList.add("shake");
      setTimeout(() => document.getElementById("login-box").classList.remove("shake"), 400);
      document.getElementById("inp-pass").value = "";
      document.getElementById("inp-pass").classList.add("err");
      setTimeout(() => document.getElementById("inp-pass").classList.remove("err"), 1500);
    }
  }, 700);
}

function showError(msg) {
  const e = document.getElementById("err-msg");
  document.getElementById("err-text").textContent = msg.replace("❌ ", "");
  e.classList.add("show");
  setTimeout(() => e.classList.remove("show"), 4000);
}

function togglePw() {
  const inp = document.getElementById("inp-pass");
  inp.type = inp.type === "password" ? "text" : "password";
}
</script>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>
</body>
</html>
