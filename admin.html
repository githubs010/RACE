<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Race Admin Panel</title>
<link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@400,500,700,800,900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0808;--surface:#150f0f;--surface-2:#1e1515;--surface-3:#2a1c1c;
  --border:rgba(255,255,255,0.07);--divider:rgba(255,255,255,0.04);
  --text:#ede9e9;--text-muted:#9a9090;--text-faint:#4e4444;
  --gold:#f5c800;--gold-dim:rgba(245,200,0,0.12);
  --green:#00e676;--green-dim:rgba(0,230,118,0.12);
  --red:#ff4444;--red-dim:rgba(255,68,68,0.12);
  --blue:#4fc3f7;--blue-dim:rgba(79,195,247,0.12);
  --purple:#ce93d8;
  --r-sm:.375rem;--r-md:.5rem;--r-lg:.75rem;--r-xl:1rem;
  --t:180ms cubic-bezier(.16,1,.3,1);
}
body{min-height:100dvh;font-family:'Cabinet Grotesk','Inter',sans-serif;color:var(--text);background:var(--bg);
  background-image:radial-gradient(ellipse 100% 50% at 50% -5%,rgba(107,26,26,.3) 0%,transparent 65%);
}

/* ── Layout ── */
.app{display:grid;grid-template-rows:auto 1fr;min-height:100dvh}

.topbar{
  background:linear-gradient(135deg,#1a0d0d 0%,#261515 100%);
  border-bottom:2px solid var(--gold);
  padding:.9rem 1.5rem;
  display:flex;align-items:center;justify-content:space-between;gap:1rem;
  position:sticky;top:0;z-index:50;
}
.topbar-left{display:flex;align-items:center;gap:.75rem}
.topbar-badge{background:var(--red);color:#fff;font-size:.65rem;font-weight:900;letter-spacing:.12em;padding:.2rem .5rem;border-radius:var(--r-sm);text-transform:uppercase}
.topbar-title{font-size:clamp(1rem,2.5vw,1.35rem);font-weight:900;letter-spacing:.08em;text-transform:uppercase;color:var(--gold)}
.topbar-right{display:flex;align-items:center;gap:.75rem}
.event-status{display:flex;align-items:center;gap:.4rem;font-size:.75rem;font-weight:700;color:var(--text-muted)}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--text-faint)}
.status-dot.live{background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.btn-audience{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(79,195,247,.3);border-radius:var(--r-md);padding:.45rem .9rem;font-family:inherit;font-size:.75rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:.35rem;transition:background var(--t)}
.btn-audience:hover{background:rgba(79,195,247,.22)}

.main{padding:1.5rem;display:flex;flex-direction:column;gap:1.5rem;max-width:860px;margin:0 auto;width:100%}

/* ── Cards ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden}
.card-header{padding:.9rem 1.25rem;border-bottom:1px solid var(--divider);display:flex;align-items:center;justify-content:space-between;gap:.75rem}
.card-title{font-size:.75rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted);display:flex;align-items:center;gap:.5rem}
.card-body{padding:1.25rem;display:flex;flex-direction:column;gap:1rem}

/* ── Event Config ── */
.event-form{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.form-group{display:flex;flex-direction:column;gap:.4rem}
.form-label{font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted)}
.form-input{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r-md);padding:.65rem .9rem;font-family:inherit;font-size:.875rem;font-weight:500;color:var(--text);outline:none;transition:border-color var(--t),box-shadow var(--t)}
.form-input::placeholder{color:var(--text-faint)}
.form-input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(245,200,0,.12)}
.form-input option{background:var(--surface-2)}
.col-span-2{grid-column:span 2}

/* ── API Row ── */
.api-row{display:flex;gap:.5rem}
.api-row input{flex:1;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r-md);padding:.55rem .9rem;font-family:inherit;font-size:.75rem;color:var(--text);outline:none;transition:border-color var(--t)}
.api-row input:focus{border-color:var(--gold)}

/* ── Buttons ── */
.btn{border:none;border-radius:var(--r-md);padding:.65rem 1.25rem;font-family:inherit;font-weight:800;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all var(--t);display:inline-flex;align-items:center;gap:.4rem;font-size:.8rem}
.btn-gold{background:var(--gold);color:#0a0808}
.btn-gold:hover{background:#ffd500;box-shadow:0 0 16px rgba(245,200,0,.35)}
.btn-outline{background:transparent;border:2px solid var(--gold);color:var(--gold)}
.btn-outline:hover{background:var(--gold);color:#0a0808}
.btn-green{background:var(--green);color:#050f08}
.btn-green:hover{background:#1fff87;box-shadow:0 0 16px rgba(0,230,118,.35)}
.btn-red{background:var(--red);color:#fff}
.btn-red:hover{background:#ff6666}
.btn-ghost{background:var(--surface-3);color:var(--text-muted);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--surface-2);color:var(--text)}
.btn:disabled{opacity:.4;cursor:not-allowed;pointer-events:none}
.btn-row{display:flex;flex-wrap:wrap;gap:.75rem;align-items:center}
.btn-full{width:100%;justify-content:center}

/* ── Racer Add Row ── */
.racer-add-row{display:grid;grid-template-columns:1fr 140px auto;gap:.75rem;align-items:end}
.color-wrap{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r-md);padding:.4rem .6rem;display:flex;align-items:center;gap:.4rem;cursor:pointer;height:44px;transition:border-color var(--t)}
.color-wrap:focus-within{border-color:var(--gold)}
.color-swatch{width:26px;height:26px;border-radius:var(--r-sm);border:1px solid rgba(255,255,255,.15);flex-shrink:0}
.color-val{font-size:.7rem;color:var(--text-muted);font-weight:600}
input[type="color"]{position:absolute;opacity:0;width:0;height:0;pointer-events:none}

/* ── Live Track ── */
.track-grid{display:flex;flex-direction:column;gap:.6rem}
.racer-row{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r-md);padding:.65rem 1rem;display:flex;align-items:center;gap:.75rem;animation:slideIn .25s cubic-bezier(.16,1,.3,1)}
@keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.racer-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.racer-name{flex:1;font-weight:700;font-size:.875rem;letter-spacing:.05em;text-transform:uppercase}
.stopwatch{font-size:.95rem;font-weight:800;font-variant-numeric:tabular-nums;color:var(--green);min-width:84px;text-align:right}
.stopwatch.done{color:var(--gold)}
.btn-xs{border:none;border-radius:var(--r-sm);padding:.25rem .65rem;font-family:inherit;font-size:.7rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;cursor:pointer;transition:background var(--t);flex-shrink:0}
.btn-xs.stop{background:var(--red);color:#fff}
.btn-xs.stop:hover{background:#ff6666}
.btn-xs.done{background:var(--surface-3);color:var(--text-faint);cursor:default}
.btn-xs.remove{background:var(--surface-3);color:var(--text-faint)}
.btn-xs.remove:hover{background:var(--red);color:#fff}

/* ── Leaderboard ── */
.lb-list{display:flex;flex-direction:column;gap:.5rem}
.lb-row{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r-md);padding:.65rem 1rem;display:flex;align-items:center;gap:.75rem;transition:border-color var(--t)}
.lb-row:hover{border-color:rgba(255,255,255,.14)}
.lb-row.r1{border-color:rgba(245,200,0,.3);background:rgba(245,200,0,.04)}
.lb-row.r2{border-color:rgba(180,180,180,.2)}
.lb-row.r3{border-color:rgba(180,120,60,.2)}
.lb-rank{font-size:.75rem;font-weight:900;letter-spacing:.08em;min-width:26px;color:var(--text-faint)}
.r1 .lb-rank{color:var(--gold)} .r2 .lb-rank{color:#b8b8b8} .r3 .lb-rank{color:#c87c3c}
.lb-bar{width:4px;height:26px;border-radius:9999px;flex-shrink:0}
.lb-name{flex:1;font-weight:700;font-size:.875rem;letter-spacing:.07em;text-transform:uppercase}
.r1 .lb-name{color:#f5d060} .r2 .lb-name{color:#d0d0d0} .r3 .lb-name{color:#d08050}
.lb-time{font-weight:800;font-size:.95rem;font-variant-numeric:tabular-nums}
.lb-actions{display:flex;gap:.35rem}
.empty{display:flex;align-items:center;justify-content:center;padding:1.5rem;color:var(--text-faint);font-size:.875rem;font-style:italic;border:1px dashed rgba(255,255,255,.06);border-radius:var(--r-md)}

/* ── Edit Modal ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl);padding:1.5rem;width:min(92vw,400px);display:flex;flex-direction:column;gap:1rem;box-shadow:0 24px 64px rgba(0,0,0,.85)}
.modal-title{font-size:.95rem;font-weight:900;letter-spacing:.08em;text-transform:uppercase;color:var(--gold)}
.modal-actions{display:flex;gap:.75rem;justify-content:flex-end}

/* ── Toast ── */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r-md);padding:.75rem 1rem;font-size:.875rem;font-weight:600;color:var(--text);box-shadow:0 4px 20px rgba(0,0,0,.6);transform:translateY(80px);opacity:0;transition:transform .3s ease,opacity .3s ease;z-index:200;display:flex;align-items:center;gap:.5rem;max-width:320px}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{border-color:rgba(0,230,118,.4)}
.toast.err{border-color:rgba(255,68,68,.4)}
.toast.wait{border-color:rgba(245,200,0,.3)}
.spinner{width:13px;height:13px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Stats bar ── */
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:.75rem}
.stat-card{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r-md);padding:.75rem 1rem;display:flex;flex-direction:column;gap:.25rem}
.stat-val{font-size:1.5rem;font-weight:900;font-variant-numeric:tabular-nums}
.stat-label{font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted)}

@media(max-width:560px){
  .event-form,.racer-add-row,.stats-bar{grid-template-columns:1fr}
  .col-span-2{grid-column:span 1}
  .racer-add-row .btn{width:100%}
}
</style>
</head>
<body>
<script>
// ── Auth Guard ─────────────────────────────────────────────────
(function() {
  const SESSION_KEY = "raceAdminSession";
  const s = JSON.parse(sessionStorage.getItem(SESSION_KEY) || "null");
  if (!s || s.expires <= Date.now()) {
    window.location.href = "login.html";
  }
})();
</script>
<div class="app">

<!-- Topbar -->
<div class="topbar">
  <div class="topbar-left">
    <span class="topbar-badge">Admin</span>
    <div class="topbar-title">🏁 Race Control</div>
  </div>
  <div class="topbar-right">
    <div class="event-status">
      <span class="status-dot" id="status-dot"></span>
      <span id="status-text">No Event</span>
    </div>
    <a href="index.html" target="_blank" class="btn-audience">📺 Audience View ↗</a>
    <button onclick="doLogout()" style="background:rgba(255,68,68,.12);color:var(--red);border:1px solid rgba(255,68,68,.28);border-radius:var(--r-md);padding:.45rem .9rem;font-family:inherit;font-size:.75rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;cursor:pointer">🚪 Logout</button>
  </div>
</div>

<div class="main">

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat-card"><div class="stat-val" id="stat-racers" style="color:var(--gold)">0</div><div class="stat-label">Racers</div></div>
    <div class="stat-card"><div class="stat-val" id="stat-finished" style="color:var(--green)">0</div><div class="stat-label">Finished</div></div>
    <div class="stat-card"><div class="stat-val" id="stat-lb" style="color:var(--blue)">0</div><div class="stat-label">Leaderboard</div></div>
    <div class="stat-card"><div class="stat-val" id="stat-best" style="color:var(--purple)">--</div><div class="stat-label">Best Lap</div></div>
  </div>
<div class="card-body">
      </div>
  </div>

  <!-- Event Config -->
  <div class="card">
    <div class="card-header">
      <div class="card-title">⚙️ Event Settings</div>
      <button class="btn btn-gold" onclick="saveEvent()">💾 Save Event</button>
    </div>
    <div class="card-body">
      <div class="event-form">
        <div class="form-group">
          <label class="form-label">Event Name</label>
          <input class="form-input" id="ev-name" type="text" placeholder="e.g. Bangalore Grand Prix" />
        </div>
        <div class="form-group">
          <label class="form-label">Venue</label>
          <input class="form-input" id="ev-venue" type="text" placeholder="e.g. NICE Road Track" />
        </div>
        <div class="form-group">
          <label class="form-label">Event Date</label>
          <input class="form-input" id="ev-date" type="date" />
        </div>
        <div class="form-group">
          <label class="form-label">Race Category</label>
          <select class="form-input" id="ev-cat">
            <option value="Sprint">Sprint Race</option>
            <option value="Endurance">Endurance Race</option>
            <option value="Lap Time">Lap Time Attack</option>
            <option value="Drag">Drag Race</option>
            <option value="Custom">Custom</option>
          </select>
        </div>
        <div class="form-group col-span-2">
          <label class="form-label">Announcement / Notes (shown to audience)</label>
          <input class="form-input" id="ev-note" type="text" placeholder="e.g. Registration open at Gate 2. Race starts at 3 PM." />
        </div>
      </div>
    </div>
  </div>

  <!-- Add Racers + Live Track -->
  <div class="card">
    <div class="card-header">
      <div class="card-title"><span class="status-dot live" id="live-dot" style="display:none"></span> Live Track</div>
      <div class="btn-row">
        <button class="btn btn-green" id="btn-start" onclick="startAll()" disabled>⚡ Start All</button>
        <button class="btn btn-ghost" onclick="newRace()">🔄 New Race</button>
      </div>
    </div>
    <div class="card-body">
      <div class="racer-add-row">
        <div class="form-group">
          <label class="form-label">Racer Name</label>
          <input class="form-input" id="racer-name" type="text" placeholder="e.g. Vikram S" autocomplete="off" />
        </div>
        <div class="form-group">
          <label class="form-label">Bike / Team Color</label>
          <div class="color-wrap" onclick="document.getElementById('cpicker').click()">
            <div class="color-swatch" id="cswatch" style="background:#f5c800"></div>
            <span class="color-val" id="cval">#F5C800</span>
            <input type="color" id="cpicker" value="#f5c800" />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" style="visibility:hidden">Add</label>
          <button class="btn btn-outline" onclick="addRacer()">+ Add</button>
        </div>
      </div>
      <div class="track-grid" id="live-track">
        <div class="empty" id="track-empty">No racers yet. Add players above.</div>
      </div>
    </div>
  </div>

  <!-- Leaderboard -->
  <div class="card">
    <div class="card-header">
      <div class="card-title">🏆 Final Leaderboard</div>
      <div class="btn-row">
        <span id="lb-count" style="font-size:.75rem;color:var(--text-faint);font-weight:700"></span>
        <button class="btn btn-ghost" onclick="clearAllConfirm()" style="font-size:.7rem">🗑 Clear All</button>
      </div>
    </div>
    <div class="card-body">
      <div class="lb-list" id="leaderboard">
        <div class="empty">No results yet.</div>
      </div>
    </div>
  </div>

</div><!-- /main -->
</div><!-- /app -->

<!-- Edit Modal -->
<div class="overlay" id="modal">
  <div class="modal">
    <div class="modal-title">✏️ Edit Entry</div>
    <div class="form-group">
      <label class="form-label">Racer Name</label>
      <input class="form-input" id="edit-name" type="text" />
    </div>
    <div class="form-group">
      <label class="form-label">Bike Color</label>
      <div class="color-wrap" style="width:160px" onclick="document.getElementById('edit-cpicker').click()">
        <div class="color-swatch" id="edit-cswatch"></div>
        <span class="color-val" id="edit-cval"></span>
        <input type="color" id="edit-cpicker" />
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-gold" onclick="saveEdit()">💾 Save to Sheet</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Config ──────────────────────────────────────────────────────
let API = localStorage.getItem('raceApi') || 'https://script.google.com/macros/s/AKfycbxxd9KZTrze3qzqWvy3UMA_5zA7hsYQQQjvTJEeC7Ulv-3yf2KZIhK4GcTfPYQzkl6ISQ/exec';
const EVENT_KEY = 'raceEvent';
const racers = [];
let editId = null;
let lbData = [];

// ── Init ────────────────────────────────────────────────────────
window.onload = () => {
  // API URL is hardcoded — no input field needed
  if (API) loadLB();
  const ev = JSON.parse(localStorage.getItem(EVENT_KEY) || '{}');
  if (ev.name)  document.getElementById('ev-name').value  = ev.name;
  if (ev.venue) document.getElementById('ev-venue').value = ev.venue;
  if (ev.date)  document.getElementById('ev-date').value  = ev.date;
  if (ev.cat)   document.getElementById('ev-cat').value   = ev.cat;
  if (ev.note)  document.getElementById('ev-note').value  = ev.note;
  if (API) loadLB();
  document.getElementById('ev-date').valueAsDate = new Date();
};

// ── Color pickers ───────────────────────────────────────────────
document.getElementById('cpicker').addEventListener('input', () => {
  document.getElementById('cswatch').style.background = cpicker.value;
  document.getElementById('cval').textContent = cpicker.value.toUpperCase();
});
document.getElementById('edit-cpicker').addEventListener('input', () => {
  document.getElementById('edit-cswatch').style.background = edit_cpicker.value;
  document.getElementById('edit-cval').textContent = edit_cpicker.value.toUpperCase();
});
const cpicker = document.getElementById('cpicker');
const edit_cpicker = document.getElementById('edit-cpicker');

// ── API ─────────────────────────────────────────────────────────
function saveApi() { /* API is hardcoded */ }

// ── Event ───────────────────────────────────────────────────────
function saveEvent() {
  const ev = {
    name:  document.getElementById('ev-name').value.trim(),
    venue: document.getElementById('ev-venue').value.trim(),
    date:  document.getElementById('ev-date').value,
    cat:   document.getElementById('ev-cat').value,
    note:  document.getElementById('ev-note').value.trim()
  };
  localStorage.setItem(EVENT_KEY, JSON.stringify(ev));
  setStatus(ev.name ? 'Live: ' + ev.name : 'No Event', !!ev.name);
  // Save to sheet "EventConfig" sheet via action
  if (API) saveEventToSheet(ev);
  else showToast('✅ Event saved locally', 'ok');
}
function setStatus(text, live) {
  document.getElementById('status-text').textContent = text;
  const d = document.getElementById('status-dot');
  d.className = 'status-dot' + (live ? ' live' : '');
}

async function saveEventToSheet(ev) {
  showToast('⏳ Saving event…', 'wait');
  try {
    const r = await fetch(API, { method:'POST', body: JSON.stringify({ action:'saveEvent', ...ev }) });
    const d = await r.json();
    if (d.success) showToast('✅ Event saved to Sheet!', 'ok');
    else showToast('⚠️ ' + (d.error||'Saved locally'), 'err');
  } catch { showToast('✅ Event saved locally', 'ok'); }
}

// ── Add Racer ───────────────────────────────────────────────────
document.getElementById('racer-name').addEventListener('keydown', e => { if (e.key==='Enter') addRacer(); });
function addRacer() {
  const inp = document.getElementById('racer-name');
  const name = inp.value.trim(); if (!name) { inp.focus(); return; }
  racers.push({ id: Date.now(), name, color: cpicker.value, elapsed: 0, running: false, finished: false, interval: null, startTime: null });
  renderTrack(); updateStats();
  document.getElementById('btn-start').disabled = false;
  inp.value = ''; inp.focus();
}

// ── Track ────────────────────────────────────────────────────────
function renderTrack() {
  const c = document.getElementById('live-track');
  const e = document.getElementById('track-empty');
  if (!racers.length) { c.innerHTML = ''; c.appendChild(e); e.style.display='flex'; document.getElementById('live-dot').style.display='none'; return; }
  document.getElementById('live-dot').style.display = 'block';
  c.innerHTML = '';
  racers.forEach(r => {
    const d = document.createElement('div');
    d.className = 'racer-row'; d.id = 'row-' + r.id;
    d.innerHTML = `
      <div class="racer-dot" style="background:${r.color};box-shadow:0 0 7px ${r.color}"></div>
      <div class="racer-name">${r.name}</div>
      <div class="stopwatch${r.finished?' done':''}" id="sw-${r.id}">${fmt(r.elapsed)}</div>
      <button class="btn-xs ${r.finished?'done':'stop'}" onclick="stopRacer(${r.id})" ${r.finished?'disabled':''}>${r.finished?'✓ Done':'Stop'}</button>
      <button class="btn-xs remove" onclick="removeRacer(${r.id})" title="Remove">✕</button>`;
    c.appendChild(d);
  });
}
function removeRacer(id) {
  const i = racers.findIndex(x=>x.id===id);
  if (i>-1) { clearInterval(racers[i].interval); racers.splice(i,1); }
  renderTrack(); updateStats();
  document.getElementById('btn-start').disabled = !racers.length;
}

// ── Start All ────────────────────────────────────────────────────
function startAll() {
  racers.forEach(r => {
    if (!r.running && !r.finished) {
      r.running = true; r.startTime = Date.now() - r.elapsed;
      r.interval = setInterval(() => {
        r.elapsed = Date.now() - r.startTime;
        const el = document.getElementById('sw-' + r.id);
        if (el) el.textContent = fmt(r.elapsed);
      }, 33);
    }
  });
  document.getElementById('btn-start').disabled = true;
  document.getElementById('btn-start').textContent = '✅ Racing…';
}

// ── Stop & Save ──────────────────────────────────────────────────
function stopRacer(id) {
  const r = racers.find(x=>x.id===id); if (!r||r.finished) return;
  clearInterval(r.interval);
  r.elapsed = Date.now() - r.startTime; r.running = false; r.finished = true;
  const sw = document.getElementById('sw-'+id);
  if (sw) { sw.textContent = fmt(r.elapsed); sw.classList.add('done'); }
  const btn = document.querySelector(`#row-${id} .btn-xs.stop`);
  if (btn) { btn.textContent = '✓ Done'; btn.disabled = true; btn.className = 'btn-xs done'; }
  saveRecord(r); updateStats();
  if (racers.every(x=>x.finished)) { document.getElementById('live-dot').style.display='none'; document.getElementById('btn-start').textContent='✅ All Finished'; }
}

async function saveRecord(r) {
  const ev = JSON.parse(localStorage.getItem(EVENT_KEY)||'{}');
  const payload = { action:'create', name:r.name, color:r.color, lapTime:fmt(r.elapsed), lapTimeMs:r.elapsed, event:ev.name||'', venue:ev.venue||'', category:ev.cat||'' };
  if (!API) { lbData.push({...payload, ID:'local-'+r.id}); lbData.sort((a,b)=>a.lapTimeMs-b.lapTimeMs); renderLB(lbData); return; }
  showToast('⏳ Saving ' + r.name + '…', 'wait');
  try {
    const res = await fetch(API, { method:'POST', body: JSON.stringify(payload) });
    const d = await res.json();
    if (d.success) { showToast('✅ ' + r.name + ' saved!', 'ok'); loadLB(); }
    else showToast('❌ ' + (d.error||'Error'), 'err');
  } catch { showToast('❌ Network error', 'err'); }
}

// ── New Race ──────────────────────────────────────────────────────
function newRace() {
  racers.forEach(r => clearInterval(r.interval));
  racers.length = 0;
  renderTrack(); updateStats();
  const b = document.getElementById('btn-start');
  b.disabled = true; b.textContent = '⚡ Start All';
}

// ── CRUD: READ ─────────────────────────────────────────────────────
async function loadLB() {
  if (!API) return;
  document.getElementById('lb-count').textContent = 'Syncing…';
  try {
    const res = await fetch(API + '?action=read&_=' + Date.now());
    const d = await res.json();
    lbData = d.records || [];
    renderLB(lbData);
    updateStats();
  } catch { document.getElementById('lb-count').textContent = 'Sync failed'; }
}

// ── CRUD: UPDATE ───────────────────────────────────────────────────
function openModal(id, name, color) {
  editId = id;
  document.getElementById('edit-name').value = name;
  edit_cpicker.value = color;
  document.getElementById('edit-cswatch').style.background = color;
  document.getElementById('edit-cval').textContent = color.toUpperCase();
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); editId = null; }
async function saveEdit() {
  if (!editId) return;
  const name = document.getElementById('edit-name').value.trim();
  const color = edit_cpicker.value;
  if (!name) return; closeModal();
  if (!API) { showToast('⚠️ Set API URL first', 'err'); return; }
  showToast('⏳ Updating…', 'wait');
  try {
    const r = await fetch(API, { method:'POST', body: JSON.stringify({ action:'update', id:editId, name, color }) });
    const d = await r.json();
    if (d.success) { showToast('✅ Updated!', 'ok'); loadLB(); } else showToast('❌ ' + (d.error||'Error'), 'err');
  } catch { showToast('❌ Network error', 'err'); }
}

// ── CRUD: DELETE ───────────────────────────────────────────────────
async function delEntry(id) {
  if (!confirm('Delete this entry?')) return;
  if (!API) return;
  showToast('⏳ Deleting…', 'wait');
  try {
    const r = await fetch(API + '?action=delete&id=' + encodeURIComponent(id));
    const d = await r.json();
    if (d.success) { showToast('🗑️ Deleted!', 'ok'); loadLB(); } else showToast('❌ ' + (d.error||'Error'), 'err');
  } catch { showToast('❌ Network error', 'err'); }
}

async function clearAllConfirm() {
  if (!confirm('Clear ALL leaderboard entries from Google Sheets? This cannot be undone.')) return;
  if (!API) return;
  showToast('⏳ Clearing…', 'wait');
  try {
    const r = await fetch(API + '?action=clearAll');
    const d = await r.json();
    if (d.success) { showToast('🗑️ All cleared!', 'ok'); loadLB(); } else showToast('❌ ' + (d.error||'Error'), 'err');
  } catch { showToast('❌ Network error', 'err'); }
}

// ── Render Leaderboard ─────────────────────────────────────────────
function renderLB(records) {
  const c = document.getElementById('leaderboard');
  document.getElementById('lb-count').textContent = records.length ? records.length + ' entries' : '';
  if (!records.length) { c.innerHTML = '<div class="empty">No results yet.</div>'; return; }
  c.innerHTML = '';
  records.forEach((e, i) => {
    const rank = i+1;
    const d = document.createElement('div');
    d.className = 'lb-row' + (rank<=3?' r'+rank:'');
    d.innerHTML = `
      <div class="lb-rank">#${rank}</div>
      <div class="lb-bar" style="background:${e.Color||e.color||'#888'}"></div>
      <div class="lb-name">${e.Name||e.name||''}</div>
      <span style="color:var(--text-faint)">│</span>
      <span>⏱️</span>
      <div class="lb-time">${e.LapTime||e.lapTime||''}</div>
      <div class="lb-actions">
        <button class="btn-xs" style="background:var(--gold-dim);color:var(--gold);border:1px solid rgba(245,200,0,.25)" onclick="openModal('${e.ID||e.id}','${(e.Name||e.name||'').replace(/'/g,"\'")}','${e.Color||e.color||''}')">✏️</button>
        <button class="btn-xs remove" onclick="delEntry('${e.ID||e.id}')">Del</button>
      </div>`;
    c.appendChild(d);
  });
}

// ── Stats ──────────────────────────────────────────────────────────
function updateStats() {
  document.getElementById('stat-racers').textContent = racers.length;
  document.getElementById('stat-finished').textContent = racers.filter(x=>x.finished).length;
  document.getElementById('stat-lb').textContent = lbData.length;
  const best = lbData.length ? fmt(Math.min(...lbData.map(x=>Number(x.LapTimeMs||x.lapTimeMs)||Infinity))) : '--';
  document.getElementById('stat-best').textContent = best === fmt(Infinity) ? '--' : best;
}

// ── Utils ──────────────────────────────────────────────────────────
function fmt(ms) {
  const m=Math.floor(ms/60000), s=Math.floor((ms%60000)/1000), c=Math.floor((ms%1000)/10);
  return `${p(m)}:${p(s)}.${p(c)}`;
}
function p(n){ return String(n).padStart(2,'0'); }

let tt;
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.className = 'toast ' + type;
  t.innerHTML = type==='wait'?`<div class="spinner"></div> ${msg}`:msg;
  t.classList.add('show');
  clearTimeout(tt);
  if (type!=='wait') tt = setTimeout(()=>t.classList.remove('show'), 3000);
}

document.getElementById('modal').addEventListener('click', e => { if (e.target===document.getElementById('modal')) closeModal(); });
setInterval(()=>{ if(API) loadLB(); }, 30000);

function doLogout() {
  if (confirm("Logout from Admin Panel?")) {
    sessionStorage.removeItem("raceAdminSession");
    window.location.href = "login.html";
  }
}

</script>
</body>
